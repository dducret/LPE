server {
    listen __LPE_NGINX_LISTEN_PORT__ default_server;
    listen [::]:__LPE_NGINX_LISTEN_PORT__ default_server;
    server_name __LPE_SERVER_NAME__;
    server_tokens off;

    index index.html;

    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header X-Frame-Options "DENY" always;
    add_header Content-Security-Policy "frame-ancestors 'none'" always;
    add_header Permissions-Policy "accelerometer=(), ambient-light-sensor=(), autoplay=(), camera=(), display-capture=(), encrypted-media=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), midi=(), payment=(), publickey-credentials-get=(), screen-wake-lock=(), usb=(), web-share=(), xr-spatial-tracking=()" always;

    location = /mail {
        return 301 /mail/;
    }

    location /mail/ {
        alias /opt/lpe/www/client/;
        try_files $uri $uri/ /mail/index.html;
    }

    location /api/ {
        client_max_body_size __LPE_NGINX_CLIENT_MAX_BODY_SIZE__;
        proxy_pass http://__LPE_BIND_ADDRESS__/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /Microsoft-Server-ActiveSync {
        proxy_pass http://__LPE_BIND_ADDRESS__/Microsoft-Server-ActiveSync;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /EWS/Exchange.asmx {
        proxy_pass http://__LPE_BIND_ADDRESS__/EWS/Exchange.asmx;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /ews/exchange.asmx {
        proxy_pass http://__LPE_BIND_ADDRESS__/ews/exchange.asmx;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /autodiscover {
        proxy_pass http://__LPE_BIND_ADDRESS__/autodiscover;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /autodiscover/ {
        proxy_pass http://__LPE_BIND_ADDRESS__/autodiscover/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /Autodiscover {
        proxy_pass http://__LPE_BIND_ADDRESS__/Autodiscover;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /Autodiscover/ {
        proxy_pass http://__LPE_BIND_ADDRESS__/Autodiscover/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /.well-known/jmap {
        proxy_pass http://__LPE_BIND_ADDRESS__/.well-known/jmap;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /autoconfig/ {
        proxy_pass http://__LPE_BIND_ADDRESS__/autoconfig/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /.well-known/autoconfig/ {
        proxy_pass http://__LPE_BIND_ADDRESS__/.well-known/autoconfig/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        root __LPE_ADMIN_WEB_ROOT__;
        try_files $uri $uri/ /index.html;
    }
}
