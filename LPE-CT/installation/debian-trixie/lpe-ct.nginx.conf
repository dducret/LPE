server {
    listen 80;
    listen [::]:80;
    server_name __LPE_CT_SERVER_NAME__;

    return 308 https://$host:__LPE_CT_NGINX_LISTEN_PORT__$request_uri;
}

server {
    listen __LPE_CT_NGINX_LISTEN_PORT__ ssl default_server;
    listen [::]:__LPE_CT_NGINX_LISTEN_PORT__ ssl default_server;
    server_name __LPE_CT_SERVER_NAME__;

    error_page 497 =308 https://$host:__LPE_CT_NGINX_LISTEN_PORT__$request_uri;

    ssl_certificate __LPE_CT_PUBLIC_TLS_CERT_PATH__;
    ssl_certificate_key __LPE_CT_PUBLIC_TLS_KEY_PATH__;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    root __LPE_CT_WEB_ROOT__;
    index index.html;

    location = /api/jmap/ws {
        proxy_pass __LPE_CT_CORE_DELIVERY_BASE_URL__/jmap/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/jmap/ {
        client_max_body_size 64m;
        proxy_pass __LPE_CT_CORE_DELIVERY_BASE_URL__/jmap/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /Microsoft-Server-ActiveSync {
        proxy_pass __LPE_CT_CORE_DELIVERY_BASE_URL__/Microsoft-Server-ActiveSync;
        proxy_http_version 1.1;
        proxy_read_timeout 1800s;
        proxy_send_timeout 1800s;
        proxy_connect_timeout 60s;
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /autodiscover/ {
        proxy_pass __LPE_CT_CORE_DELIVERY_BASE_URL__/autodiscover/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /Autodiscover/ {
        proxy_pass __LPE_CT_CORE_DELIVERY_BASE_URL__/Autodiscover/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /autoconfig/ {
        proxy_pass __LPE_CT_CORE_DELIVERY_BASE_URL__/autoconfig/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /.well-known/autoconfig/ {
        proxy_pass __LPE_CT_CORE_DELIVERY_BASE_URL__/.well-known/autoconfig/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        proxy_pass http://__LPE_CT_BIND_ADDRESS__/api/v1/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
